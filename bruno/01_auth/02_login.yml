info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/auth/login'
  body:
    type: json
    data: |-
      {
        "email": "admin@test.com",
        "password": "admin"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("token", res.body.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
