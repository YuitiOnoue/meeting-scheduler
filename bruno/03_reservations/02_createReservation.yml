info:
  name: createReservation
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/reservations'
  body:
    type: json
    data: |2-
        {
          "roomId": "{{roomId}}",
          "title": "Another meeting",
          "date": "2026-07-15",
          "organizer": "Henrique",
          "startTime": "15:00",
          "endTime": "16:00"
        }

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("roomId", res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
