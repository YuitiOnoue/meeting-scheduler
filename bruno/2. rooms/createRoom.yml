info:
  name: createRoom
  type: http
  seq: 3

http:
  method: POST
  url: '{{baseUrl}}/rooms'
  body:
    type: json
    data: |2-
        {
          "name": "Sala para excluir",
          "capacity": 8,
          "location": "10º andar",
          "description": "Sala teste para excluir",
          "amenities": [
            "projector",
            "whiteboard",
            "tv"
          ]
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("roomId", res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
