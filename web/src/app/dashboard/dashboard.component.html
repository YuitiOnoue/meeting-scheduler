<div class="dashboard">
  @for (room of rooms; track room.id) {
    <div class="room-card">
      <h2>{{ room.name }}</h2>
      <p>{{ room.location }}</p>
      <p>Capacity: {{ room.capacity }}</p>
      <p class="status">{{ reservationsByRoom[room.id] | roomStatus }}</p>
    </div>
  } @empty {
    <p>Loading rooms...</p>
  }
</div>
